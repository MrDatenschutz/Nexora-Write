<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora – Text</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header (10%) */
    #header {
      height: 10vh;
      min-height: 60px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    #header-left {
      display: flex;
      flex-direction: column;
    }

    #app-title {
      font-size: 1.4rem;
      color: #38bdf8;
      font-weight: 600;
    }

    #file-name {
      font-size: 0.9rem;
      color: #9ca3af;
    }

    #header-right button {
      margin-left: 10px;
      padding: 8px 14px;
      background: #38bdf8;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #header-right button:hover {
      background: #0ea5e9;
    }

    /* Hauptbereich (90%) */
    #main {
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #020617;
    }

    /* Toolbar */
    #toolbar {
      padding: 8px 12px;
      border-bottom: 1px solid #1f2937;
      background: #020617;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tool-btn, .tool-select {
      background: #0b1120;
      border: 1px solid #1f2937;
      color: #e5e7eb;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .tool-btn:hover, .tool-select:hover {
      border-color: #38bdf8;
    }

    .tool-select {
      padding: 5px 8px;
    }

    /* Editor */
    #editor-wrapper {
      flex: 1;
      padding: 16px;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    #editor {
      width: 90%;
      max-width: 900px;
      min-height: 90%;
      background: #0b1120;
      border-radius: 10px;
      padding: 30px;
      color: #e5e7eb;
      outline: none;
      border: 1px solid #1f2937;
      font-family: "Calibri", "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #editor:focus {
      border-color: #38bdf8;
    }

    /* Print / PDF */
    @media print {
      body {
        background: #ffffff;
      }
      #header, #toolbar {
        display: none;
      }
      #editor-wrapper {
        padding: 0;
      }
      #editor {
        border: none;
        width: 100%;
        max-width: 100%;
        background: #ffffff;
        color: #000000;
      }
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="header-left">
      <div id="app-title">Nexora Text</div>
      <div id="file-name">Unbenannt.nxt</div>
    </div>
    <div id="header-right">
      <button id="saveBtn">Speichern (.nxt)</button>
      <button id="pdfBtn">Export als PDF</button>
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <!-- Schriftgröße -->
      <select id="fontSizeSelect" class="tool-select">
        <option value="3">Größe: Standard</option>
        <option value="2">Klein</option>
        <option value="3">Normal</option>
        <option value="4">Groß</option>
        <option value="5">Sehr groß</option>
      </select>

      <!-- Fett / Kursiv / Unterstrichen -->
      <button class="tool-btn" data-cmd="bold"><b>F</b></button>
      <button class="tool-btn" data-cmd="italic"><i>K</i></button>
      <button class="tool-btn" data-cmd="underline"><u>U</u></button>

      <!-- Aufzählung -->
      <button class="tool-btn" data-cmd="insertUnorderedList">• Liste</button>
      <button class="tool-btn" data-cmd="insertOrderedList">1. Liste</button>

      <!-- Ausrichtung -->
      <button class="tool-btn" data-cmd="justifyLeft">Links</button>
      <button class="tool-btn" data-cmd="justifyCenter">Zentriert</button>
      <button class="tool-btn" data-cmd="justifyRight">Rechts</button>

      <!-- Undo / Redo -->
      <button class="tool-btn" data-cmd="undo">↶ Undo</button>
      <button class="tool-btn" data-cmd="redo">↷ Redo</button>
    </div>

    <div id="editor-wrapper">
      <div id="editor" contenteditable="true">
        <!-- Dein Text hier -->
      </div>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const saveBtn = document.getElementById("saveBtn");
    const pdfBtn = document.getElementById("pdfBtn");
    const fileNameLabel = document.getElementById("file-name");
    const fontSizeSelect = document.getElementById("fontSizeSelect");

    // Toolbar Buttons (execCommand)
    document.querySelectorAll(".tool-btn[data-cmd]").forEach(btn => {
      btn.addEventListener("click", () => {
        const cmd = btn.getAttribute("data-cmd");
        document.execCommand(cmd, false, null);
        editor.focus();
      });
    });

    // Schriftgröße
    fontSizeSelect.addEventListener("change", () => {
      const size = fontSizeSelect.value; // 1–7
      document.execCommand("fontSize", false, size);
      editor.focus();
    });

    // Speichern als .nxt (HTML-Inhalt)
    saveBtn.addEventListener("click", () => {
      const content = editor.innerHTML;
      const blob = new Blob([content], { type: "text/html;charset=utf-8" });

      let name = prompt("Dateiname für Nexora Text (.nxt):", "Dokument");
      if (!name) return;

      if (!name.toLowerCase().endsWith(".nxt")) {
        name += ".nxt";
      }

      fileNameLabel.textContent = name;

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    // Export als PDF (über Drucken → Als PDF speichern)
    pdfBtn.addEventListener("click", () => {
      window.print();
    });
  </script>

</body>
</html>
