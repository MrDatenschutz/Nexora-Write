<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Nexora Write</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header (10%) */
    #header {
      height: 10vh;
      min-height: 60px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    #app-title {
      font-size: 1.4rem;
      color: #38bdf8;
      font-weight: 600;
    }

    #file-name {
      font-size: 0.9rem;
      color: #9ca3af;
    }

    #header-right button {
      margin-left: 10px;
      padding: 8px 14px;
      background: #38bdf8;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #header-right button:hover {
      background: #0ea5e9;
    }

    /* Hauptbereich (90%) */
    #main {
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #020617;
    }

    /* Toolbar */
    #toolbar {
      padding: 8px 12px;
      border-bottom: 1px solid #1f2937;
      background: #020617;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tool-btn, .tool-select {
      background: #0b1120;
      border: 1px solid #1f2937;
      color: #e5e7eb;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .tool-btn:hover, .tool-select:hover {
      border-color: #38bdf8;
    }

    /* Editor */
    #editor-wrapper {
      flex: 1;
      padding: 16px;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
    }

    #editor {
      width: 90%;
      max-width: 900px;
      min-height: 90%;
      background: #0b1120;
      border-radius: 10px;
      padding: 30px;
      color: #e5e7eb;
      outline: none;
      border: 1px solid #1f2937;
      font-family: "Calibri", "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #editor:focus {
      border-color: #38bdf8;
    }
  </style>
</head>
<body>

  <div id="header">
    <div>
      <div id="app-title">Nexora Write</div>
      <div id="file-name">Unbenannt.nxt</div>
    </div>

    <div id="header-right">
      <button id="saveBtn">Speichern (.nxt)</button>
      <button id="pdfBtn">Export als PDF</button>
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <select id="fontSizeSelect" class="tool-select">
        <option value="3">Größe: Standard</option>
        <option value="2">Klein</option>
        <option value="3">Normal</option>
        <option value="4">Groß</option>
        <option value="5">Sehr groß</option>
      </select>

      <button class="tool-btn" data-cmd="bold"><b>F</b></button>
      <button class="tool-btn" data-cmd="italic"><i>K</i></button>
      <button class="tool-btn" data-cmd="underline"><u>U</u></button>

      <button class="tool-btn" data-cmd="insertUnorderedList">• Liste</button>
      <button class="tool-btn" data-cmd="insertOrderedList">1. Liste</button>

      <button class="tool-btn" data-cmd="justifyLeft">Links</button>
      <button class="tool-btn" data-cmd="justifyCenter">Zentriert</button>
      <button class="tool-btn" data-cmd="justifyRight">Rechts</button>

      <button class="tool-btn" data-cmd="undo">↶ Undo</button>
      <button class="tool-btn" data-cmd="redo">↷ Redo</button>
    </div>

    <div id="editor-wrapper">
      <div id="editor" contenteditable="true"></div>
    </div>
  </div>

  <!-- html2pdf.js (lokal eingebunden) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    const editor = document.getElementById("editor");
    const saveBtn = document.getElementById("saveBtn");
    const pdfBtn = document.getElementById("pdfBtn");
    const fileNameLabel = document.getElementById("file-name");
    const fontSizeSelect = document.getElementById("fontSizeSelect");

    // Toolbar Buttons
    document.querySelectorAll(".tool-btn[data-cmd]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.execCommand(btn.dataset.cmd, false, null);
        editor.focus();
      });
    });

    // Schriftgröße
    fontSizeSelect.addEventListener("change", () => {
      document.execCommand("fontSize", false, fontSizeSelect.value);
      editor.focus();
    });

    // Speichern als .nxt
    saveBtn.addEventListener("click", () => {
      const content = editor.innerHTML;
      const blob = new Blob([content], { type: "text/html;charset=utf-8" });

      let name = prompt("Dateiname:", "Dokument");
      if (!name) return;
      if (!name.toLowerCase().endsWith(".nxt")) name += ".nxt";

      fileNameLabel.textContent = name;

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = name;
      link.click();
      URL.revokeObjectURL(link.href);
    });

    // Export als PDF (echter Download)
    pdfBtn.addEventListener("click", () => {
      const opt = {
        margin: 10,
        filename: "Nexora-Text.pdf",
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
      };

      html2pdf().set(opt).from(editor).save();
    });
  </script>

</body>
</html>
